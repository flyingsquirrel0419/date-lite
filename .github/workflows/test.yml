name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - coverage-badge.json
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Run tests
        id: tests
        run: npx vitest run 2>&1 | tee test-output.txt

      - name: Coverage
        id: coverage
        run: npx vitest run --coverage 2>&1 | tee coverage-output.txt
        if: matrix.node-version == 22

      - name: Update coverage badge
        if: matrix.node-version == 22 && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Extract total line coverage percentage
          COV_PCT=$(grep -m1 "All files" coverage-output.txt | awk '{print $4}' | sed 's/%//')
          if [ -z "$COV_PCT" ]; then
            echo "Could not extract coverage percentage"
            exit 0
          fi
          # Round to integer (handles 97.14 → 97)
          COV_INT=$(echo "$COV_PCT" | awk '{printf "%.0f", $1}')
          # Determine badge color
          if [ "$COV_INT" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$COV_INT" -ge 80 ]; then COLOR="green"
          elif [ "$COV_INT" -ge 70 ]; then COLOR="yellow"
          else COLOR="red"
          fi
          # Write badge JSON
          cat > coverage-badge.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${COV_INT}%","color":"${COLOR}"}
          EOF
          # Commit and push if changed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage-badge.json
          git diff --cached --quiet || git commit -m "Update coverage badge [skip ci]"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Test Summary (Node.js ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TEST_RESULT="${{ steps.tests.outcome }}"

          if [ "$TEST_RESULT" = "success" ]; then
            echo "- **Tests:** Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Tests:** Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat test-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          # Coverage summary (only on Node 22)
          if [ "${{ matrix.node-version }}" = "22" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -A 20 "% Stmts" coverage-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$TEST_RESULT" != "success" ]; then
            exit 1
          fi

  # Consolidated summary across all Node versions
  test-summary:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## Test Matrix Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 18 | ${{ needs.test.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 20 | ${{ needs.test.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 22 | ${{ needs.test.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
