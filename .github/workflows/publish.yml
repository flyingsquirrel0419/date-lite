name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build
        id: build
        run: npm run build

      - name: Verify bundle size
        id: size
        run: |
          SIZE=$(node -e "const z=require('zlib'),f=require('fs');process.stdout.write((z.gzipSync(f.readFileSync('dist/index.mjs')).length/1024).toFixed(2))")
          echo "size_kb=$SIZE" >> $GITHUB_OUTPUT
          echo "Bundle minzipped: ${SIZE} KB"
          if (( $(echo "$SIZE > 5" | bc -l) )); then
            echo "::error::Bundle size ${SIZE} KB exceeds 5 KB budget"
            exit 1
          fi

      - name: Run tests
        id: test
        run: npm test

      - name: Check NPM_TOKEN availability
        id: token-check
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::warning::NPM_TOKEN secret is not configured. Publish will be skipped."
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
            # Verify token works by checking npm identity
            npm whoami 2>/dev/null || echo "::warning::NPM_TOKEN is set but npm whoami failed — token may be invalid or lack publish permission"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        id: publish
        if: steps.token-check.outputs.has_token == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish skipped
        if: steps.token-check.outputs.has_token == 'false'
        run: |
          echo "::warning::NPM_TOKEN is not set in repository secrets. Package was not published."
          echo "To enable publishing, add NPM_TOKEN to Settings > Secrets and variables > Actions"

      - name: Summary
        if: always()
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "## Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`$TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle size:** ${{ steps.size.outputs.size_kb || 'N/A' }} KB (budget: 5 KB)" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests:** ${{ steps.test.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          HAS_TOKEN="${{ steps.token-check.outputs.has_token }}"
          PUBLISH_RESULT="${{ steps.publish.outcome }}"

          if [ "$HAS_TOKEN" = "false" ]; then
            echo "- **Publish:** Skipped (NPM_TOKEN not configured)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> To enable npm publishing, add your npm access token as a repository secret named \`NPM_TOKEN\`." >> $GITHUB_STEP_SUMMARY
            echo "> See: https://docs.github.com/en/actions/security-for-github-actions/security-guides/using-secrets-in-github-actions" >> $GITHUB_STEP_SUMMARY
          elif [ "$PUBLISH_RESULT" = "success" ]; then
            echo "- **Publish:** Published to npm" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Package: https://www.npmjs.com/package/date-lite" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Publish:** Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Common causes" >> $GITHUB_STEP_SUMMARY
            echo "- NPM_TOKEN is expired or revoked" >> $GITHUB_STEP_SUMMARY
            echo "- NPM_TOKEN lacks **publish** permission (needs Automation or Read and Write)" >> $GITHUB_STEP_SUMMARY
            echo "- Package name is already taken by another account" >> $GITHUB_STEP_SUMMARY
            echo "- 2FA is enabled on npm but token is not an Automation token" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Fix: Go to https://www.npmjs.com/settings/tokens and create a **Classic Automation token** or a **Granular Access Token with Read and Write** permission." >> $GITHUB_STEP_SUMMARY
          fi

          BUILD_RESULT="${{ steps.build.outcome }}"
          TEST_RESULT="${{ steps.test.outcome }}"
          if [ "$BUILD_RESULT" != "success" ] || [ "$TEST_RESULT" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Build or tests failed. Package was not published.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
